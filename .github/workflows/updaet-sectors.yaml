
name: Update CoinGecko Sectors

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *'

jobs:
  update-sectors:
    if: ${{ github.event_name == 'schedule' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    
    # GCS에 인증하고 Secret을 사용하기 위한 권한
    permissions:
      contents: 'read'
      id-token: 'write'
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    # uv 설치 및 의존성 설치
    - name: Install uv
      uses: astral-sh/setup-uv@v3

    - name: Restore uv cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Install dependencies
      run: uv sync --frozen

    - name: Validate durable state configuration
      env:
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        GCS_BUCKET_NAME: ${{ vars.GCS_BUCKET_NAME }}
      run: |
        if [ -z "$GCP_PROJECT_ID" ]; then
          echo "::error::GCP_PROJECT_ID repository secret is required for Google Cloud sector storage."
          exit 1
        fi
        if [ -z "$GCS_BUCKET_NAME" ]; then
          echo "::error::GCS_BUCKET_NAME repository variable is required for durable production state."
          exit 1
        fi

    # Google Cloud에 인증 (GCS에 업로드하기 위해 필요)
    - name: Authenticate to Google Cloud
      uses: 'google-github-actions/auth@v2'
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
        service_account: ${{ secrets.GCP_RUNTIME_SA_EMAIL }}

    # 섹터 업데이트 스크립트 실행
    - name: Run sector update script
      run: uv run python update_sectors.py
      env:
        # GitHub Repository Secret에 'CG_API_KEY'라는 이름으로 키를 저장해야 함
        CG_API_KEY: ${{ secrets.CG_API_KEY }}
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        GCS_BUCKET_NAME: ${{ vars.GCS_BUCKET_NAME }}
        STATE_STORAGE_METHOD: GCS
        CG_SYMBOL_OVERRIDES: ${{ vars.CG_SYMBOL_OVERRIDES || '{}' }}
